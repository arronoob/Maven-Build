name: Java CI with Maven  
  
on:  
  push:  
concurrency:  
  group: environment-${{ github.ref }}  
  cancel-in-progress: true  
  
jobs:  
  maven_build:  
    strategy:  
      matrix:  
        version: [11, 8]  
    runs-on: ubuntu-latest  
  
    steps:  
      - uses: actions/checkout@v3  
  
      - name: Set up JDK "${{ matrix.version }}"  
        uses: actions/setup-java@v3  
        with:  
          java-version: "${{ matrix.version }}"  
 
          distribution: 'temurin'  
 
 
          cache: maven  
  
      - name: Cache Maven Dependencies  
        uses: actions/cache@v3  
        with:  
          path: ~/.m2  
          key: ${{ runner.os }}-cache  
  
      - name: Build with Maven  
        run: mvn -B package --file pom.xml

      - name: Trigger Jenkins Job  
        run: |
         crumb=$(curl -s -u ${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }} \
         http://172.31.44.177:8080/crumbIssuer/api/xml?xpath=concat\(//crumbRequestField,\":\",//crumb\))

         curl -X POST http://172.31.44.177:8080/job/tomcat-deploy/build \
         -u ${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }} \
         -H "$crumb"
